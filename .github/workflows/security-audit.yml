name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ── 1. Dependency Audit (SCA) ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Frontend npm audit (fail on CRITICAL only)
        run: npm audit --audit-level=critical

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Backend npm audit (fail on CRITICAL only)
        working-directory: backend
        run: npm audit --audit-level=critical

  # ── 2. Secret Scanning ────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for Gitleaks

      - name: Gitleaks — scan full history
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true  # informational until baseline established
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # TruffleHog: on push, diff against previous commit; on PR, diff against PR base
      - name: TruffleHog — entropy-based scan (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified
        continue-on-error: true  # skip gracefully when base == head (force-push / first commit)

  # ── 3. SAST — Semgrep ─────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      # semgrep scan (OSS mode, no SEMGREP_APP_TOKEN required)
      # Findings are uploaded to the GitHub Security tab via SARIF
      - name: Semgrep — OWASP + secrets + React + TypeScript + Node.js
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --config "p/react" \
            --config "p/typescript" \
            --config "p/nodejs" \
            --sarif \
            --output semgrep.sarif || true
        # continue-on-error: findings go to Security tab, non-blocking until triaged

      - name: Upload Semgrep SARIF to GitHub Security
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── 4. ESLint Security ────────────────────────────────────────────────────
  # Note: Semgrep (job 3) already covers OWASP/secrets/React/Node.js rules.
  # This job adds eslint-plugin-security as a lightweight complement — fully non-blocking.
  eslint-security:
    name: ESLint Security Rules
    runs-on: ubuntu-latest
    continue-on-error: true  # entire job is informational
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install ESLint 8 + plugins into an isolated project to avoid ESLint 9 conflicts
      # (ESLint 9 removed --plugin/--rule CLI flags for external plugins)
      - name: Setup isolated ESLint 8 env
        working-directory: /tmp
        run: |
          mkdir eslint-scan && cd eslint-scan
          npm init -y
          npm install --save-dev eslint@8 eslint-plugin-security eslint-plugin-no-secrets

      - name: Run ESLint security scan
        run: |
          cd /tmp/eslint-scan
          node_modules/.bin/eslint \
            --resolve-plugins-relative-to /tmp/eslint-scan \
            --plugin security \
            --plugin no-secrets \
            --rule 'security/detect-unsafe-regex: error' \
            --rule 'security/detect-non-literal-regexp: warn' \
            --rule 'no-secrets/no-secrets: warn' \
            --ext .ts,.tsx \
            --format json \
            --output-file /tmp/eslint-security.json \
            $GITHUB_WORKSPACE/src/ \
            $GITHUB_WORKSPACE/backend/lib/ \
            $GITHUB_WORKSPACE/backend/routes/ \
            $GITHUB_WORKSPACE/backend/middleware/ || true

      - name: Upload ESLint results
        if: always() && hashFiles('/tmp/eslint-security.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: eslint-security-report
          path: /tmp/eslint-security.json

  # ── 5. CodeQL Analysis ────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  # ── 6. Security Summary on PR ─────────────────────────────────────────────
  security-summary:
    name: Post Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, secret-scan, semgrep, eslint-security, codeql]
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Dependency Audit (SCA)': '${{ needs.dependency-audit.result }}',
              'Secret Scanning':        '${{ needs.secret-scan.result }}',
              'SAST (Semgrep)':         '${{ needs.semgrep.result }}',
              'ESLint Security':        '${{ needs.eslint-security.result }}',
              'CodeQL':                 '${{ needs.codeql.result }}',
            };
            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
            const rows = Object.entries(results)
              .map(([k, v]) => `| ${k} | ${icon(v)} ${v} |`)
              .join('\n');
            const blocking = Object.values(results).some(v => v === 'failure');
            const body = [
              '## 🔒 Security Audit Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              rows,
              '',
              blocking
                ? '⚠️ **Blocking security issues found — resolve before merging.**'
                : '✅ No critical security issues detected.',
              '',
              '_Powered by Gitleaks · Semgrep · CodeQL · npm audit_',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
